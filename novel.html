<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>When Rain Remembers</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:#130e08;display:flex;align-items:center;justify-content:center;font-family:'Lora',Georgia,serif;}

.book{
  position:relative;width:min(960px,100vw);height:100vh;
  display:flex;flex-direction:column;background:#f0e8d8;
  box-shadow:-8px 0 0 #2a1a0e,-14px 6px 30px rgba(0,0,0,.65),6px 6px 50px rgba(0,0,0,.45),16px 16px 80px rgba(0,0,0,.3);
  border-radius:0 6px 6px 0;overflow:hidden;
}
.book::before{content:'';position:absolute;top:0;left:0;bottom:0;width:8px;background:linear-gradient(to right,#1a0e06,#4a2e18,#1a0e06);z-index:20;}
.book::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:1;background-image:repeating-linear-gradient(0deg,transparent,transparent 30px,rgba(120,80,30,.04) 30px,rgba(120,80,30,.04) 31px);}

.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 1.6rem 0 1.8rem;height:40px;background:#e8dcc8;border-bottom:1px solid #d4c4a8;z-index:10;position:relative;}
.topbar-title{font-family:'Playfair Display',serif;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:#7a5a3a;}
.dots{display:flex;gap:7px;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;background:#c8b898;cursor:pointer;transition:background .2s,transform .2s;}
.dot.on{background:#8a5a2a;transform:scale(1.3);}

.inner{flex:1;display:flex;overflow:hidden;position:relative;z-index:2;animation:pgIn .4s cubic-bezier(.4,0,.2,1);}
@keyframes pgIn{from{opacity:0;transform:perspective(800px) rotateY(-5deg) translateX(-10px);}to{opacity:1;transform:perspective(800px) rotateY(0) translateX(0);}}

/* art panel — LEFT */
.art-panel{flex-shrink:0;width:clamp(170px,30%,280px);background:#0d0e18;border-right:1px solid #c4b090;overflow:hidden;}
.art-panel svg{width:100%;height:100%;display:block;}
.art-panel.wide{width:45%;}

/* prose panel — RIGHT */
.prose-panel{flex:1;overflow-y:auto;padding:1.8rem 2.2rem 1.8rem 2rem;background:#f0e8d8;}
.prose-panel::-webkit-scrollbar{width:4px;}
.prose-panel::-webkit-scrollbar-thumb{background:#c8b090;border-radius:2px;}

/* cover right */
.cover-right{flex:1;display:flex;flex-direction:column;justify-content:center;padding:2.5rem 2.8rem;background:#f0e8d8;overflow:auto;}

.ch-label{display:block;font-size:.63rem;letter-spacing:.28em;text-transform:uppercase;color:#b08060;font-family:'Lora',serif;margin-bottom:.5rem;}
.ch-title{font-family:'Playfair Display',serif;font-size:clamp(1.2rem,2.2vw,1.9rem);font-weight:700;color:#1e1408;line-height:1.15;margin-bottom:.2rem;}
.ch-rule{width:2rem;height:2px;background:#8a5a2a;margin:.9rem 0 1.4rem;}

.prose{font-size:clamp(.85rem,1.2vw,.98rem);line-height:1.88;color:#2a1e10;}
.prose p{margin-bottom:.9rem;text-align:justify;text-indent:1.4em;hyphens:auto;}
.prose p:first-of-type,.prose p.ni{text-indent:0;}
.prose em{font-style:italic;color:#160e06;}
.prose .speech{font-style:italic;color:#160e06;text-indent:0;margin-bottom:.7rem;padding-left:.9rem;border-left:2px solid #d4c4a8;}
.prose .thought{font-style:italic;color:#3a2818;text-indent:0;margin:.2rem 0 .85rem;padding:.3rem .85rem;background:#e8dcc8;border-left:3px solid #b08060;border-radius:0 3px 3px 0;font-size:.94em;}
.prose .letter{font-style:italic;color:#3a2818;text-indent:0;margin:.35rem 0 .85rem;padding:.35rem .95rem;border-left:3px solid #c8a070;background:#ece2ce;border-radius:0 3px 3px 0;}
.prose .scene{text-align:center;color:#b08060;margin:1.2rem 0;letter-spacing:.4em;font-size:.62rem;text-indent:0;}

.big-title{font-family:'Playfair Display',serif;font-size:clamp(1.7rem,3.5vw,3rem);font-weight:700;color:#1e1408;line-height:1.1;margin-bottom:.5rem;}
.cover-rule{width:2.8rem;height:2px;background:#8a5a2a;margin:.9rem 0;}
.cover-sub{font-size:clamp(.65rem,1.1vw,.8rem);letter-spacing:.2em;text-transform:uppercase;color:#8a7050;margin-bottom:1.6rem;}
.cover-quote{font-size:clamp(.82rem,1.1vw,.9rem);line-height:1.8;color:#4a3820;margin-bottom:1.5rem;font-style:italic;}
.cover-btn{display:inline-block;font-family:'Lora',serif;font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;color:#8a5a2a;background:transparent;border:1px solid #c8a070;border-radius:2px;padding:.42rem 1rem;cursor:pointer;transition:all .2s;}
.cover-btn:hover{background:#8a5a2a;color:#f0e8d8;}

.nav{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:.55rem 1.4rem;background:#2a1a0e;border-top:1px solid #1a0e06;z-index:10;position:relative;gap:.8rem;}
.nbtn{font-family:'Lora',serif;font-size:clamp(.62rem,1vw,.75rem);letter-spacing:.12em;text-transform:uppercase;color:#c8a878;background:transparent;border:1px solid #5a3a1e;border-radius:2px;padding:.35rem clamp(.55rem,1.2vw,.9rem);cursor:pointer;transition:all .2s;white-space:nowrap;}
.nbtn:hover{background:rgba(200,160,100,.15);border-color:#c8a878;color:#f0d8a0;}
.nbtn:disabled{opacity:.2;cursor:default;}
.nav-mid{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
.nav-label{font-family:'Lora',serif;font-size:.6rem;color:#6a4a2a;letter-spacing:.1em;}

/* MOBILE */
@media(max-width:580px){
  html,body{overflow:auto;height:auto;}
  .book{height:auto;min-height:100vh;width:100vw;border-radius:0;}
  .book::before{display:none;}
  .inner{flex-direction:column;height:auto;overflow:visible;animation:none;}
  .art-panel,.art-panel.wide{width:100%;height:220px;border-right:none;border-bottom:1px solid #c4b090;}
  .art-panel svg{height:220px;object-fit:cover;}
  .prose-panel,.cover-right{overflow:visible;padding:1.4rem 1.1rem;}
  .cover-right{padding:1.6rem 1.2rem;}
}
</style>
</head>

html:`<span class="ch-label">Chapter One</span><h2 class="ch-title">A Promise in the Rain</h2><div class="ch-rule"></div>
<div class="prose">
<p>It was a quiet evening when the city lights began to glow...</p>
<p>The café was warm, the chatter soft, the smell of roasted beans lingering in the air. But Eva sat by the window, untouched tea growing cold. Her laptop glowed faintly with half-written notes, though her pen had long stilled in her hand.</p>
<p>Her eyes were not on her work. They were on the rain.</p>
<p>Raindrops slid down the glass like threads of memory, each one tugging her backward. Back to the winter two years ago, when Ren was still beside her.</p>
<p>She remembered his grin, his teasing voice.</p>
<p class="speech"><em>"Eva, if you slack off again, I'll finish the whole music assignment by myself. Then you'll owe me… forever."</em></p>
<p>Her lips trembled. <em>"Forever,"</em> she echoed under her breath, though the word was now heavier, crueler.</p>
<p>That winter, they had walked under one umbrella, laughing as snow and rain blurred together. He had squeezed her hand tightly and said it with such certainty:</p>
<p class="speech"><em>"I'll hold your hand and walk through the rain forever."</em></p>
<p>Her chest constricted. Forever… how foolish, how sweet.</p>
<p>Because forever ended in a hospital room.</p>
<p>She saw it again—the pale walls, the antiseptic sting, the steady beeping that faltered more and more. Ren's body weak, his once bright laughter hollowed out by pain.</p>
<p>Eva's voice cracked in the memory.</p>
<p class="speech"><em>"Ren… would you have stayed a bit longer if I held on to your hand tighter?"</em></p>
<p>The machines hummed in response, cold and unfeeling. She bowed her head, whispering through her tears.</p>
<p class="speech"><em>"This rain carries your memories… and your smell. I want to hold you. I want to be in your home. I want to look into your eyes, I want to hear your voice… please. You took my heart in whole."</em></p>
<p>Her tears blurred her vision. Even now, sitting in the café, she could feel the warmth of his fading hand in hers.</p>
<p>In the hospital, Ren had whispered, voice fragile as mist.</p>
<p class="speech"><em>"Eva… I will be with you as rain. I am sorry for leaving you alone."</em> His breath shook, his eyes barely open. <em>"I am sorry… for not keeping my forever. But on days when you cry… I promise I will come as rain and sit beside you."</em></p>
<p>Her sobs had been silent, trapped in her throat, as his hand slipped out of hers.</p>
<p>Now, two winters later, she pressed her forehead to the café window, watching the rain streak down.</p>
<p class="speech"><em>"Ren,"</em> she whispered, her voice raw, <em>"you promised."</em></p>
<p>Outside, the storm thickened, raindrops racing each other to the earth. It was as if the sky itself wept with her, keeping his vow when he could not.</p>
<p>Every drizzle, every storm carried his memory. His voice. His warmth. His promise.</p>
<p>And yet—forever had ended too soon.</p>
</div>`},

html:`<span class="ch-label">Chapter Two</span><h2 class="ch-title">Rain and Memories</h2><div class="ch-rule"></div>
<div class="prose">
<p>Rain fell in thin threads outside the café window, tracing rivers down the glass. Inside, Eva sat by herself, a cup of untouched tea steaming faintly before her. In her hands, her old phone played a recording—his voice.</p>
<p>Ren.</p>
<p>Her lost love, her first love. His singing was soft, a little unpolished, but to her it had always sounded like the truest thing in the world. Each note carried her back to days of shared umbrellas, whispered promises under overcast skies, and laughter drowned by storms.</p>
<p>A tear slipped down her cheek. She didn't wipe it away.</p>
<p>At the counter across the café, Ray watched her. A young man with sharp eyes and restless energy, he found himself irritated without knowing why. She looked like a ghost clinging to someone else's shadow. To him, love was supposed to be fire, not ashes—something you fought for, claimed, won.</p>
<p>But she sat there, fragile, her entire being wrapped around a memory.</p>
<p>When she finally stood to leave, fate pulled them together. The evening had turned into a downpour. Eva hurried along the street, umbrella forgotten at home, when she heard it—that voice.</p>
<p>Someone was singing under an awning to a small, scattered crowd. Notes rising through the rain, raw but powerful. She froze mid-step, the world spinning.</p>
<p>Her heart leapt and broke at once. That voice. It was his.</p>
<p>The crowd dispersed, and only she remained, trembling. Ray lowered the mic from his lips, shaking his wet hair out of his eyes. That's when he noticed her—staring, crying silently.</p>
<p class="speech"><em>"Hey,"</em> he called, frowning. <em>"What's with the tears? I wasn't that bad."</em></p>
<p>Eva shook her head, clutching her chest. <em>"Your voice… it's just like his."</em></p>
<p>Ray stiffened, confused. <em>"His?"</em></p>
<p>She whispered, almost to herself. <em>"…Ren."</em></p>
<p>Ray's brows knitted. <em>"So that's it. I remind you of some guy. Great."</em> His voice dripped with annoyance, almost anger. <em>"I'm not interested in being anyone's replacement."</em></p>
<p>Eva finally looked at him, her eyes soft yet unyielding. <em>"I know. You're not him. But…"</em> her lips trembled, <em>"…the rain carried me here. And your voice—it brought him back to me."</em></p>
<p>For a moment, only the downpour answered.</p>
<p>Ray scoffed, turning away. <em>"Pathetic. Love isn't about clinging to ghosts."</em></p>
<p>Eva didn't reply. Instead, she tilted her face upward, letting the rain wash over her tears.</p>
<p class="speech"><em>"Why are you being the pathetic loser you already are?"</em> Ray's voice cut through the rhythm of the storm.</p>
<p>Eva swallowed hard, lifting her gaze to meet his. <em>"I… I just miss him."</em></p>
<p class="speech"><em>"While I'm still here, let me give you some advice. Clinging onto the past won't do you any good. Long-lost love and a clinging heroine—sounds cool only in dramas. Your life is still in front of you… so is love. To conquer someone's heart and actually be with them—that's what matters."</em></p>
<p>Eva shook her head gently, water dripping from her hair. <em>"I understand. All this bluffing… I don't believe it. Love is about being with someone forever, and victory… victory is being with them. I miss him, that's it. I don't regret the memories. I don't regret him. A person like you will never understand a love that still lives in the heart, that still exists—not in physical form, but in memories and feelings. I pity you for that."</em></p>
<p>Ray's lips pressed into a thin line. Then, with a half-laugh, half-growl, he shook his head. <em>"Wow. You have the authenticity to pity me,"</em> he said, voice quieter now, almost reluctant. <em>"Indeed… our perspectives are different."</em></p>
<p>The rain watched silently, carrying both her grief and his scorn in its endless fall.</p>
<p>And yet, as they stood there—two figures in the downpour—something unspoken stirred between them. The air felt heavier, charged. Ray noticed the way her wet hair clung to her face, the tension in her jaw, the quiet defiance in her eyes. Eva felt it too—the sharp edge of his gaze, the faint tremor in his voice, the way the storm seemed to fold them into its rhythm.</p>
<p>Neither moved, but both knew that something had shifted. The past was still there, but so was possibility. And in that moment, the rain didn't just carry memories—it carried a spark.</p>
<p>The rain lingered as their unspoken witness. It knew she wasn't crazy—she was simply remembering. And he wasn't cruel—only afraid.</p>
</div>`},

html:`<span class="ch-label">Chapter Three</span><h2 class="ch-title">Echoes Between Hearts</h2><div class="ch-rule"></div>
<div class="prose">
<p>Ray sat in his room, surrounded by music instruments, scattered sheet music, and half-finished melodies scribbled in notebooks. The dim light of the evening filtered through the window, catching dust motes floating in the air. He leaned back in his chair, staring outside, replaying yesterday's memory.</p>
<p>At the corner of the café, he had seen her—the girl with teary eyes, fragile yet somehow alive, as if she had something to tell the rain itself.</p>
<p>It was as though she longed for someone lost in the downpour.</p>
<p class="thought">Indeed, he thought — I want to capture her attention. I sang. The crowd listened, but I wanted her to listen. To be at ease.</p>
<p>He couldn't explain why. He didn't even fully understand the feeling himself.</p>
<p class="thought">I don't usually… I'm not like this.</p>
<p>But disappointment crept in too. As he recalled her face, he realized: she was remembering someone who was gone, someone dead, and trying to find him in his voice.</p>
<p class="thought">Of course… our philosophy on love doesn't match. The world I've seen is different.</p>
<p>His parents had loved, married, yet their bonds hadn't lasted forever. Friends, lovers, people he'd met—love seemed fleeting, fragile, temporary. And now here was Eva, clinging to a long-lost love, believing it was worth the ache.</p>
<p>He shook his head, trying to banish the irritation, but the memory lingered.</p>
<p>Eva, too, remembered him. His sharp gaze, the way his fingers had hovered over the microphone, the tone of his voice—but he wasn't Ren. He was his own person, and yet…</p>
<p>Her heart twisted in confusion. She had spent years holding Ren in the corners of her memory, listening for echoes of him in songs, in voices that reminded her of what was gone. And now, here was Ray—similar, different, alive, yet impossible to ignore.</p>
<p class="thought">Why does his voice stir me like that? It isn't him… and yet it feels like it brushes against the same part of my heart. But that's impossible. I can't… I won't replace him.</p>
<p class="thought">I shouldn't care about this. I'm not ready. I can't let someone else into this space… not yet. But why does it feel like he's trying to reach me, to understand me, even without words?</p>
<p>The memory of Ren was still vivid—his laugh, his promises, the warmth of shared rain-soaked moments—but with Ray, there was something different. A presence that was startlingly immediate, a weight in his gaze that pressed on her, demanding acknowledgment.</p>
<p class="thought">He's not Ren… but why does it feel like he sees the pieces of me I've hidden from everyone else?</p>
</div>`},

html:`<span class="ch-label">Chapter Four</span><h2 class="ch-title">Is It Okay to Love Again?</h2><div class="ch-rule"></div>
<div class="prose">
<p>Fate, it seemed, had a way of nudging them together. Sometimes accidental. Sometimes deliberate. Sometimes it was two hearts seeking answers they couldn't yet name.</p>
<p>One evening, caught together under the same awning as the rain poured around them, they simply stood in silence.</p>
<p>The rain became their silent battleground. Whenever storms came, Eva would grow nostalgic, while Ray grew restless.</p>
<p>One evening, caught under the same awning, Eva confessed:<br/>"Every raindrop reminds me of him. It hurts, but it also keeps me alive."</p>
<p>Ray clenched his fists. "Then what about me? Am I just an echo of his voice to you?!"</p>
<p>Silence. The rain poured harder, filling the space between them.</p>
<p>"No," Eva said finally, her voice steady. "You are you, Ray. You're different—louder, harsher, but alive in a way he never was. The rain brought me to you, too."</p>
<p>Ray stared at her, stunned. For the first time, he realized—love wasn't a victory to be claimed. It wasn't about erasing the past, but about accepting its place in someone's heart.</p>
<p>He looked at her tired, weary eyes. Love had left deep wounds, and he could see the careful effort she made to hold herself together. He recognized that feeling—the sharp ache when love departs too quickly, before one is ready to accept it or move on; the unsaid words, the promises left dangling, the future once dreamed but never realized—all of it lingering in the corners of the heart, haunting every aspect of one's very existence.</p>
<p>He wanted to reach for her, to hold her face gently, to close his eyes and whisper that he was here now. He wanted to hold her hand, to anchor her to the present, to ease the weight of her memories.</p>
<p class="thought">Hey Ren… he thought, silently, painfully — release her from your memories. You know she doesn't deserve all this pain. She's carried you long enough.</p>
<p class="thought">I don't want to take anything from you, Ren, he admitted in his mind — but please… say goodbye. Let her live, let her breathe. She deserves a life beyond the shadows of someone who is gone.</p>
<p>She could feel his gaze upon her, warm with quiet compassion, tinged with the helpless sorrow of someone who wished he could take her pain away. But she knew she wasn't ready to turn toward him, to let another person see all that had been broken and left behind.</p>
<p>The rain continued to fall around them, soft yet insistent, carrying the echoes of the past, the ache of absence, and the fragile stirrings of the present. Each drop seemed to hold Ren's memory, lingering in the space between them—unanswered, unresolved, yet impossible to ignore.</p>
<p>And in the quiet of her mind, Eva heard him—Ren's voice, tender and ephemeral, weaving through her memory:</p>
<p class="speech"><em>"Eva, I hope I fade away from your heart as the rain stops slowly, so that it hurts less with time. And when you smile again, I will rejoice in the skies as the light sunshine that appears after the rain."</em></p>
<p>Her chest tightened.</p>
<p class="thought">Ren… is it okay if I let this person in? Is it okay if I wish to feel his warmth? Is it okay if… She pressed her hands to her face, silent tears slipping through her fingers. You are still forever mine…</p>
<p>Sometimes letting go is hard. In the spaces between apologies, regrets, and words that could not be spoken or explained, the heart lingers on questions it cannot answer. Is love meant to last forever? Or is it the journey—the stolen moments, the laughter, the pain—that holds the true meaning?</p>
<p>Is it enough to simply be grateful that it happened, even if it never reached the ending we had imagined? Even if the heart bears the scars of longing and the memory of someone lost, perhaps there is grace in the ache itself, in the quiet acknowledgment that what was beautiful need not be permanent to have mattered.</p>
<p>And in that shared moment, the rain became a witness to hearts suspended between memory and hope, between loss and the fragile possibility of something new—between the past that lingered and the present that waited.</p>

html:`<span class="ch-label">Chapter Five</span><h2 class="ch-title">It's Okay Even If It's Not Perfect</h2><div class="ch-rule"></div>
<div class="prose">
<p>Their bond grew slowly, unevenly, like flowers pushing through cracks in concrete. Ray still struggled—sometimes jealous of a memory, sometimes frustrated by her tears. But each time, Eva gently reminded him:</p>
<p>"Love isn't about winning. It's about connecting. Even if it doesn't last forever, it's real."</p>
<p>Ray began to change. He sang not to prove himself, but to share something true. He started listening when Eva spoke of Ren—not with envy, but with respect. And in return, Eva began to see Ray not as a shadow of the past, but as a new light in her present.</p>
<p>One stormy evening, Eva and Ray stood under a single umbrella. The sound of the rain wrapped around them, familiar and intimate, just as it always had.</p>
<p>"Do you still think I'm weak?" Eva asked softly.</p>
<p>Ray shook his head, a faint smile touching his lips. "No. You're the strongest person I know. You taught me love isn't about holding on or letting go—it's about… feeling it fully, even if it breaks you."</p>
<p>Eva smiled, her tears blending with the rain.<br/>"And you taught me that it's okay to let love bloom again."</p>
<p>The rain fell steadily, carrying with it Ren's memory, Eva's grief, and Ray's newfound tenderness. It did not wash away the past—it carried it forward, whispering that love doesn't end. It transforms, reshaping hearts, guiding them toward connection, and allowing new light to grow even from old shadows.</p>
<p>Once again, they met in the café on a rainy day. This time, they looked at each other—ready, finally, to walk beside one another.</p>
<p>Eva gazed out the window at the pouring rain, letting the rhythm of the drops mirror the thoughts in her heart.</p>
<p>Dear Ren, she whispered to herself.</p>
<p class="letter">There is a place in my heart where love bloomed first.<br/>I have felt the precious touch of love—two eyes that searched for me, and hands that held mine too tightly.<br/>A person who taught me to love, to hear the rain as music, and to see the world through the shade of a shared heart.</p>
<p class="letter">It's okay you couldn't tend to the promises made.<br/>It's okay our story didn't have a complete ending.</p>
<p class="letter">I know that when we were together, it was our small world against the world.<br/>And now… I am ready for a new journey.</p>
<p class="letter">A different love.</p>
<p class="letter">You will always be in my memories, to remind me that love is not just happy endings, but the feeling itself.</p>
<p>She turned her gaze to Ray, her voice steady but soft:</p>
<p>"Ray… thank you. For teaching me about new beginnings as well.<br/>For showing me that the heart can heal, that it can bloom again, even while carrying the past with it.<br/>For teaching me that love is not about erasing memory, but about letting it coexist with hope."</p>
<p>Ray listened silently, her words echoing in his chest like a melody he had never known he needed. He felt the weight of her past, the lingering presence of Ren, and the fragile courage in her voice. His throat tightened, and he swallowed back the lump of emotion. A deep ache ran through him—not of loss, but of reverence, of understanding, of wanting to hold and protect this heart that had endured so much.</p>
<p class="thought">She has carried so much and still chooses to bloom, he thought. She trusts me with this—me, imperfect and human—and I can't let her down. I can't take the past from her, but I can walk beside her, quietly, steadfastly. Let her grow, let her heal, let her laugh again. And if I'm lucky… maybe she'll let me be part of the new world she's brave enough to step into.</p>
<p>They looked at the rain together, and for a moment, it was not a reminder of sorrow or loss. The drops hit and faded away, soft as whispered promises, soaking the earth and coaxing new life from the soil. Even when dark clouds hung overhead, concealing the sun, the rain reminded them that growth comes through patience, that sadness can shape hope, and that after every storm, a rainbow waits to appear.</p>
<p>The rain, like their hearts, fell, lingered, and healed.</p>
<div class="scene">· · · fin · · ·</div>

let cur=0;
const dotRow=document.getElementById('dotrow');
PAGES.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='dot'+(i===0?' on':'');
  d.id='d'+i;d.title=PAGES[i].label;d.onclick=()=>jumpTo(i);
  dotRow.appendChild(d);
});

function render(){
  const p=PAGES[cur];
  const inner=document.getElementById('inner');
  const a=document.createElement('div');
  a.className='art-panel'+(p.artClass?' '+p.artClass:'');
  a.innerHTML=p.art;
  const r=document.createElement('div');
  r.className=p.rightClass||'prose-panel';
  r.innerHTML=p.html;
  inner.style.animation='none';
  inner.offsetHeight;
  inner.style.animation='';
  inner.innerHTML='';
  inner.appendChild(a);
  inner.appendChild(r);
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===cur));
  document.getElementById('nav-lbl').textContent=p.label;
  document.getElementById('pb').disabled=cur===0;
  document.getElementById('nb').disabled=cur===PAGES.length-1;
}
function jumpTo(n){cur=n;render();}
function go(d){if(cur+d>=0&&cur+d<PAGES.length){cur+=d;render();}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(1);if(e.key==='ArrowLeft')go(-1);});
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50)go(dx<0?1:-1);},{passive:true});
render();
</script>
